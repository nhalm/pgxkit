services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      # No fixed host port — Docker assigns a free one to avoid 5432 conflicts.
      # The Makefile discovers it via `docker compose port postgres 5432`.
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 3s
      retries: 30
